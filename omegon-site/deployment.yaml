apiVersion: v1
kind: ServiceAccount
metadata:
  name: omegon-site
  namespace: omegon-site
  labels:
    app.kubernetes.io/name: omegon-site
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: omegon-site
  namespace: omegon-site
  labels:
    app.kubernetes.io/name: omegon-site
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: omegon-site
  template:
    metadata:
      labels:
        app.kubernetes.io/name: omegon-site
    spec:
      serviceAccountName: omegon-site
      imagePullSecrets:
        - name: ghcr-secret

      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101

      containers:
        - name: nginx
          image: ghcr.io/styrene-lab/omegon-site:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 10
          securityContext:
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: cache
              mountPath: /var/cache/nginx
            - name: run
              mountPath: /var/run

      volumes:
        - name: tmp
          emptyDir: {}
        - name: cache
          emptyDir: {}
        - name: run
          emptyDir: {}
